services:
  # ==================== PostgreSQL 16 ====================
  postgres:
    image: postgres:16-alpine
    container_name: captagov-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: captagov
      POSTGRES_PASSWORD: captagov_dev
      POSTGRES_DB: captagov
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U captagov -d captagov"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - captagov-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: captagov-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass captagov_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - captagov-network

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: captagov-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: captagov
      RABBITMQ_DEFAULT_PASS: captagov_rabbit
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - captagov-network

  # ==================== Mailhog ====================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: captagov-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - captagov-network

  # ==================== API (NestJS) ====================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: captagov-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://captagov:captagov_dev@postgres:5432/captagov?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: captagov_redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: captagov
      RABBITMQ_PASS: captagov_rabbit
      JWT_SECRET: change-this-to-a-random-secret
      JWT_EXPIRES_IN: 3600
      JWT_REFRESH_SECRET: change-this-to-a-random-refresh-secret
      JWT_REFRESH_EXPIRES_IN: 604800
      SIOP_API_URL: https://api.siop.gov.br/graphql
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - captagov-network

  # ==================== Web (Next.js) ====================
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: captagov-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    depends_on:
      - api
    networks:
      - captagov-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  captagov-network:
    driver: bridge
    name: captagov-network
