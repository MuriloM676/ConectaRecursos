version: '3.8'

services:
  # ==================== PostgreSQL 16 ====================
  postgres:
    image: postgres:16-alpine
    container_name: captagov-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: captagov
      POSTGRES_PASSWORD: captagov_dev
      POSTGRES_DB: captagov
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U captagov -d captagov"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - captagov-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: captagov-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass captagov_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - captagov-network

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: captagov-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: captagov
      RABBITMQ_DEFAULT_PASS: captagov_rabbit
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - captagov-network

  # ==================== Mailhog ====================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: captagov-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - captagov-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  captagov-network:
    driver: bridge
    name: captagov-network
